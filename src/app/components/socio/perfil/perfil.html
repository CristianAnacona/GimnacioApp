<div class="profile-container p-6 bg-slate-50 min-h-screen">
  @if (perfil) {
  <div class="flex flex-col items-center mt-4">
    <!-- ✅ Foto con botón para cambiar -->
    <div class="relative w-32 h-32">
      <div class="w-full h-full rounded-full border-4 border-[#1d4ed8] p-1 shadow-xl">
        <img [src]="perfil?.fotoUrl || 'https://ui-avatars.com/api/?name=' + perfil?.nombre"
          class="w-full h-full rounded-full object-cover" alt="Profile">
      </div>
      

    </div>

    <h1 class="text-2xl font-black text-slate-800 mt-4 italic uppercase">{{ perfil?.nombre }}</h1>

    <span
      class="bg-orange-100 text-[#1d4ed8] text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-tighter mt-2 mb-2">
      {{ perfil?.mensajeMotivador}}
    </span>
  </div>

  <!-- Días restantes -->
  <div class="flex justify-center w-full max-w-xl mx-auto mt-4">
    <div
      class="w-full bg-white rounded-[20px] p-2 shadow-sm border border-slate-50 flex flex-col items-center justify-center">
      <span
        class="text-[10px] sm:text-[9px] font-black text-slate-400 uppercase tracking-tighter leading-none mb-1 text-center">
        Tu fecha de Vencimiento es:
      </span>
      <span class="text-1xl sm:text-xl">⏳</span>
      <span class="text-2xl font-black text-[#8b0000] mt-1">
        {{ diasRestantes }} {{ diasRestantes === 1 ? 'día' : 'días' }}
      </span>
    </div>
  </div>

  <!-- Menú de opciones -->
  <div class="mt-4 bg-white rounded-4xl shadow-sm border border-slate-100 overflow-hidden">
    <button routerLink="/socio/datos-personales"
      class="cursor-pointer w-full flex items-center justify-between p-5 border-b border-slate-50 hover:bg-slate-50">
      <div class="flex items-center gap-3">
        <span class="text-xl">👤</span>
        <span class="text-sm font-bold text-slate-700">Datos Personales</span>
      </div>
      <span class="text-slate-300">→</span>
    </button>

    <button [routerLink]="['/perfil/suscripcion']"
      class="w-full flex items-center justify-between p-5 border-b border-slate-50 hover:bg-slate-50">
      <div class="flex items-center gap-3">
        <span class="text-xl">💳</span>
        <span class="text-sm font-bold text-slate-700">Mi Suscripción</span>
      </div>
      <span class="text-slate-300">→</span>
    </button>

    <button [routerLink]="['/perfil/fuerza']"
      class="w-full flex items-center justify-between p-5 border-b border-slate-50 hover:bg-slate-50">
      <div class="flex items-center gap-3">
        <span class="text-xl">📊</span>
        <span class="text-sm font-bold text-slate-700">Estadísticas de Fuerza</span>
      </div>
      <span class="text-slate-300">→</span>
    </button>
  </div>

  } @else {
  <!-- Loading -->
  <div class="flex flex-col items-center justify-center h-screen bg-slate-50">
    <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-bold text-slate-400 italic">Cargando tu progreso...</p>
  </div>
  }
</div>
