<div class="page">

  <h2 class="page-title">⚙️ Mi Cuenta</h2>

  @if (admin) {
    <div class="admin-card">
      <div class="avatar">{{ admin.nombre?.[0]?.toUpperCase() }}</div>
      <div class="admin-info">
        <p class="admin-nombre">{{ admin.nombre }}</p>
        <p class="admin-email">{{ admin.email }}</p>
        <span class="badge-admin">Administrador</span>
      </div>
    </div>

    <!-- Logo del Gimnasio -->
    @if (gym) {
      <div class="gym-logo-card">
        <p class="section-title">Logo del Gimnasio</p>
        <div class="logo-row">
          <label class="logo-label" for="logoInput">
            @if (gym.logo) {
              <img [src]="gym.logo" class="logo-preview" [alt]="gym.nombre">
            } @else {
              <div class="logo-empty" [style.background]="gym.colores?.primario || '#f97316'">
                {{ gym.nombre[0] }}
              </div>
            }
            <span class="logo-hint">Toca para cambiar</span>
          </label>
          <input type="file" id="logoInput" accept="image/*" (change)="onLogoChange($event)" style="display:none">
          <button class="btn-guardar" (click)="guardarLogo()" [disabled]="!gym.logo || guardando">
            {{ guardando ? 'Guardando...' : 'Guardar logo' }}
          </button>
        </div>
      </div>
    }

    <div class="menu-card">
      <a routerLink="/admin/socios" class="menu-item">
        <span class="menu-icon">👥</span>
        <span>Gestión de Socios</span>
        <span class="menu-arrow">→</span>
      </a>
      <a routerLink="/admin/rutinas" class="menu-item">
        <span class="menu-icon">🏋️</span>
        <span>Rutinas</span>
        <span class="menu-arrow">→</span>
      </a>
      <a routerLink="/admin/noticias" class="menu-item">
        <span class="menu-icon">📰</span>
        <span>Noticias</span>
        <span class="menu-arrow">→</span>
      </a>
      <a routerLink="/admin/pagos" class="menu-item">
        <span class="menu-icon">💳</span>
        <span>Pagos</span>
        <span class="menu-arrow">→</span>
      </a>
    </div>

    <button class="btn-logout" (click)="cerrarSesion()">
      🚪 Cerrar Sesión
    </button>
  }

</div>
