<div class="page">

  <h2 class="page-title">⚙️ Mi Cuenta</h2>

  @if (admin) {
    <div class="admin-card">
      <div class="avatar">{{ admin.nombre?.[0]?.toUpperCase() }}</div>
      <div class="admin-info">
        <p class="admin-nombre">{{ admin.nombre }}</p>
        <p class="admin-email">{{ admin.email }}</p>
        <span class="badge-admin">Administrador</span>
      </div>
    </div>

    <div class="menu-card">
      <a routerLink="/admin/socios" class="menu-item">
        <span class="menu-icon">👥</span>
        <span>Gestión de Socios</span>
        <span class="menu-arrow">→</span>
      </a>
      <a routerLink="/admin/rutinas" class="menu-item">
        <span class="menu-icon">🏋️</span>
        <span>Rutinas</span>
        <span class="menu-arrow">→</span>
      </a>
      <a routerLink="/admin/noticias" class="menu-item">
        <span class="menu-icon">📰</span>
        <span>Noticias</span>
        <span class="menu-arrow">→</span>
      </a>
      <a routerLink="/admin/pagos" class="menu-item">
        <span class="menu-icon">💳</span>
        <span>Pagos</span>
        <span class="menu-arrow">→</span>
      </a>
    </div>

    <button class="btn-logout" (click)="cerrarSesion()">
      🚪 Cerrar Sesión
    </button>
  }

</div>
