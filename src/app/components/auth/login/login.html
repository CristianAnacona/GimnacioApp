<div class="login-bg">
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <div class="deco deco-3"></div>
  <div class="deco deco-4"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Header azul dentro de la card -->
      <div class="card-header">
        <div class="brand-logo-ring">
          <img src="icons/LogoGym.jpg" alt="Logo" class="brand-logo">
        </div>
        <h1 class="brand-name">KODIAK<span class="brand-gym">GYM</span></h1>
        <p class="brand-sub">Strength · Discipline · Power</p>
      </div>

      <!-- Formulario -->
      <div class="card-body">

        <div class="field-group">
          <label class="field-label">Correo electrónico</label>
          <div class="field-wrap">
            <span class="field-icon">✉️</span>
            <input type="email" name="email" [(ngModel)]="usuario.email" required
              class="field-input" placeholder="ejemplo@kodiak.com">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Contraseña</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input #passInput [type]="verPass ? 'text' : 'password'" name="password"
              [(ngModel)]="usuario.password" required
              class="field-input" placeholder="••••••••">
            <button type="button" class="toggle-pass" (click)="verPass = !verPass; passInput.focus()">
              {{ verPass ? '🙉' : '🙈' }}
            </button>
          </div>
        </div>

        <button type="button" [disabled]="cargando" (click)="iniciarSesion()" class="btn-login">
          @if (!cargando) { Iniciar Sesión }
          @else {
            <span class="btn-loading">
              <svg class="spin" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10"/>
              </svg>
              Cargando...
            </span>
          }
        </button>

        <p class="card-footer-text">
          ¿Eres nuevo? <a routerLink="/register" class="card-link">Regístrate aquí</a>
        </p>

      </div>
    </div>
  </div>
</div>
