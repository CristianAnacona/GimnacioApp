<div class="min-h-screen bg-[#090f1e] flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-sm">

    <!-- Header con logo -->
    <div class="bg-gradient-to-b from-[#1e3a8a] via-[#172554] to-[#0f172a] rounded-t-3xl pt-5 pb-4 text-center px-6 shadow-2xl">

      <div class="flex justify-center mb-2">
        <div class="p-1 rounded-2xl bg-white/10 backdrop-blur-sm shadow-lg shadow-blue-900/50">
          <img src="icons/LogoGym.jpg" alt="Logo"
            class="w-16 h-16 rounded-xl object-cover logo-blend">
        </div>
      </div>

      <h1 class="text-2xl font-black tracking-tight text-white uppercase">
        KODIAK<span class="text-blue-400/70 font-light ml-1">GYM</span>
      </h1>
      <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-blue-300/70 mt-0.5">
        Strength · Discipline · Power
      </p>
    </div>

    <!-- Formulario -->
    <div class="bg-[#f8fbff] rounded-b-3xl shadow-2xl px-6 pt-7 pb-8 space-y-5">

      <div class="space-y-1.5">
        <label class="block text-xs font-extrabold text-[#1d4ed8] uppercase tracking-widest ml-1">
          Correo electrónico
        </label>
        <input type="email" name="email" [(ngModel)]="usuario.email" required
          class="w-full px-4 py-3.5 bg-[#f0f5ff] border-2 border-[#c8dcff] focus:border-[#1d4ed8] rounded-2xl outline-none transition-all text-slate-800 font-medium placeholder-slate-400 text-sm"
          placeholder="ejemplo@kodiak.com">
      </div>

      <div class="space-y-1.5">
        <label class="block text-xs font-extrabold text-[#1d4ed8] uppercase tracking-widest ml-1">
          Contraseña
        </label>
        <div class="relative">
          <input #passwordInput [type]="verPass ? 'text' : 'password'" name="password"
            [(ngModel)]="usuario.password" required
            class="w-full px-4 py-3.5 bg-[#f0f5ff] border-2 border-[#c8dcff] focus:border-[#1d4ed8] rounded-2xl outline-none transition-all text-slate-800 font-medium placeholder-slate-400 pr-12 text-sm"
            placeholder="••••••••">
          <button type="button" (click)="verPass = !verPass; passwordInput.focus()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-xl focus:outline-none">
            {{ verPass ? '🙉' : '🙈' }}
          </button>
        </div>
      </div>

      <button type="button" [disabled]="cargando" (click)="iniciarSesion()"
        class="w-full bg-gradient-to-r from-[#1e40af] to-[#1d4ed8] text-white font-extrabold py-4 rounded-2xl transition-all shadow-lg shadow-blue-700/40 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed text-sm tracking-widest uppercase mt-2">
        @if (!cargando) {
          Iniciar Sesión
        } @else {
          <span class="inline-flex items-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            Cargando...
          </span>
        }
      </button>

      <p class="text-center text-sm text-[#7a9bc0]">
        ¿Eres nuevo?
        <a routerLink="/register" class="text-[#1d4ed8] font-bold hover:underline">Regístrate aquí</a>
      </p>

    </div>
  </div>
</div>
