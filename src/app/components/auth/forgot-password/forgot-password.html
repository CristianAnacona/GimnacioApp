<div class="login-bg">
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="card-header">
        <div class="brand-logo-ring">
          <img src="icons/LogoGym.jpg" alt="Logo" class="brand-logo">
        </div>
        <h1 class="brand-name">KODIAK<span class="brand-gym">GYM</span></h1>
        <p class="brand-sub">Recuperar contraseña</p>
      </div>

      <div class="card-body">

        @if (!enviado) {
          <p class="info-text">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

          <div class="field-group">
            <label class="field-label">Correo electrónico</label>
            <div class="field-wrap">
              <span class="field-icon">✉️</span>
              <input type="email" [(ngModel)]="email" required
                class="field-input" placeholder="ejemplo@kodiak.com">
            </div>
          </div>

          <button type="button" [disabled]="!email || cargando" (click)="enviar()" class="btn-login">
            @if (!cargando) { Enviar enlace }
            @else {
              <span class="btn-loading">
                <svg class="spin" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10"/>
                </svg>
                Enviando...
              </span>
            }
          </button>
        }

        @if (enviado) {
          <div class="success-box">
            <span class="success-icon">📬</span>
            <p class="success-title">¡Correo enviado!</p>
            <p class="success-sub">Revisa tu bandeja de entrada y sigue las instrucciones. El enlace expira en 1 hora.</p>
          </div>
        }

        <p class="card-footer-text">
          <a routerLink="/login" class="card-link">← Volver al inicio de sesión</a>
        </p>

      </div>
    </div>
  </div>
</div>
